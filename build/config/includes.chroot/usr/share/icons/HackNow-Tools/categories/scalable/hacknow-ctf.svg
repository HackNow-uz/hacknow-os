<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="pole" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="50%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1744"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
  </defs>
  <!-- Flag pole -->
  <rect x="13" y="4" width="3" height="56" fill="url(#pole)" stroke="#424242" stroke-width="0.6"/>
  <!-- Pole top (cap) -->
  <circle cx="14.5" cy="4" r="2.5" fill="#ffd54f" stroke="#7d4f00" stroke-width="0.6"/>
  <!-- Flag wave shape (triangular pennant style) -->
  <path d="M 16 7
           L 54 11
           C 50 17, 56 21, 52 27
           L 16 31 Z"
        fill="url(#flagGrad)"
        stroke="#7f0000"
        stroke-width="0.8"/>
  <!-- Checkered pattern (CTF symbol) -->
  <g fill="#fff" opacity="0.85">
    <rect x="20" y="11" width="5" height="5"/>
    <rect x="30" y="11" width="5" height="5"/>
    <rect x="40" y="11" width="5" height="5"/>
    <rect x="25" y="16" width="5" height="5"/>
    <rect x="35" y="16" width="5" height="5"/>
    <rect x="20" y="21" width="5" height="5"/>
    <rect x="30" y="21" width="5" height="5"/>
    <rect x="40" y="21" width="5" height="5"/>
  </g>
  <!-- "F" letter on flag (FLAG) -->
  <text x="48" y="22" font-family="monospace" font-size="9" font-weight="bold" fill="#fff" opacity="0.7">{ }</text>
</svg>
