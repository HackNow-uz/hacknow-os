<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <linearGradient id="hilt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#c79100"/>
    </linearGradient>
  </defs>
  <!-- Sword tip -->
  <polygon points="32,4 28,10 36,10" fill="url(#blade)"/>
  <!-- Sword blade -->
  <rect x="29" y="9" width="6" height="34" fill="url(#blade)" stroke="#7f0000" stroke-width="0.4"/>
  <!-- Blade center line -->
  <line x1="32" y1="10" x2="32" y2="42" stroke="#fff" stroke-width="0.8" opacity="0.6"/>
  <!-- Crossguard -->
  <rect x="16" y="42" width="32" height="4" rx="1" fill="url(#hilt)" stroke="#7d4f00" stroke-width="0.6"/>
  <!-- Hilt grip -->
  <rect x="29" y="46" width="6" height="12" fill="#5d4037" stroke="#3e2723" stroke-width="0.4"/>
  <!-- Pommel -->
  <circle cx="32" cy="60" r="3.5" fill="url(#hilt)" stroke="#7d4f00" stroke-width="0.6"/>
  <!-- Gem in crossguard -->
  <circle cx="32" cy="44" r="1.5" fill="#d50000"/>
</svg>
