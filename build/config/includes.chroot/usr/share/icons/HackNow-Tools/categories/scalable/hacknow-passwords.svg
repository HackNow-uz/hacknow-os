<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="lock-r" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <linearGradient id="key-r" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
  </defs>
  <!-- Lock body -->
  <rect x="20" y="28" width="24" height="22" rx="3" fill="url(#lock-r)" stroke="#7f0000" stroke-width="1.5"/>
  <!-- Lock shackle -->
  <path d="M 25 28 L 25 20 Q 25 12 32 12 Q 39 12 39 20 L 39 28"
        fill="none" stroke="#7f0000" stroke-width="4" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="32" cy="36" r="2.5" fill="#3e2723"/>
  <rect x="31" y="36" width="2" height="6" fill="#3e2723"/>
  <!-- Key crossing -->
  <g transform="rotate(-30 50 50)">
    <circle cx="50" cy="46" r="5" fill="none" stroke="url(#key-r)" stroke-width="3"/>
    <rect x="49" y="46" width="2" height="14" fill="url(#key-r)"/>
    <rect x="49" y="54" width="5" height="2" fill="url(#key-r)"/>
    <rect x="49" y="58" width="3" height="2" fill="url(#key-r)"/>
  </g>
</svg>
