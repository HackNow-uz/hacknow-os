<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5e92f3"/>
      <stop offset="50%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bbdefb"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M 32 4 L 56 12 L 56 30 Q 56 50 32 60 Q 8 50 8 30 L 8 12 Z"
        fill="url(#shield)"
        stroke="url(#border)"
        stroke-width="2.5"
        stroke-linejoin="round"/>
  <!-- Inner border -->
  <path d="M 32 9 L 51 15 L 51 30 Q 51 47 32 55 Q 13 47 13 30 L 13 15 Z"
        fill="none"
        stroke="#bbdefb"
        stroke-width="1"
        stroke-linejoin="round"
        opacity="0.6"/>
  <!-- Checkmark inside shield -->
  <polyline points="20,32 28,40 44,22"
            fill="none"
            stroke="#fff"
            stroke-width="4.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>
