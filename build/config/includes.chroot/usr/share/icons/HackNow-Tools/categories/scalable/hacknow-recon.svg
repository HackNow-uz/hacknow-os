<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="lens-r" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffcdd2"/>
      <stop offset="60%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </radialGradient>
  </defs>
  <!-- Handle -->
  <line x1="42" y1="42" x2="58" y2="58" stroke="#7f0000" stroke-width="6" stroke-linecap="round"/>
  <line x1="42" y1="42" x2="58" y2="58" stroke="#d32f2f" stroke-width="3" stroke-linecap="round"/>
  <!-- Lens ring -->
  <circle cx="26" cy="26" r="18" fill="url(#lens-r)" stroke="#b71c1c" stroke-width="3"/>
  <!-- Glass reflection -->
  <ellipse cx="20" cy="20" rx="6" ry="4" fill="#fff" opacity="0.4"/>
  <!-- Crosshair -->
  <line x1="26" y1="14" x2="26" y2="20" stroke="#fff" stroke-width="1"/>
  <line x1="26" y1="32" x2="26" y2="38" stroke="#fff" stroke-width="1"/>
  <line x1="14" y1="26" x2="20" y2="26" stroke="#fff" stroke-width="1"/>
  <line x1="32" y1="26" x2="38" y2="26" stroke="#fff" stroke-width="1"/>
</svg>
