<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="wifi-r" cx="50%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </radialGradient>
  </defs>
  <!-- Outer wave -->
  <path d="M 8 28 Q 32 4 56 28"
        fill="none" stroke="url(#wifi-r)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <!-- Middle wave -->
  <path d="M 16 36 Q 32 18 48 36"
        fill="none" stroke="url(#wifi-r)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- Inner wave -->
  <path d="M 22 44 Q 32 32 42 44"
        fill="none" stroke="url(#wifi-r)" stroke-width="5" stroke-linecap="round"/>
  <!-- Central dot -->
  <circle cx="32" cy="52" r="5" fill="url(#wifi-r)" stroke="#7f0000" stroke-width="1"/>
  <!-- Wireless emanation lines -->
  <line x1="6" y1="6" x2="14" y2="14" stroke="#d32f2f" stroke-width="1.5" opacity="0.5"/>
  <line x1="58" y1="6" x2="50" y2="14" stroke="#d32f2f" stroke-width="1.5" opacity="0.5"/>
</svg>
