<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="node-p" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </radialGradient>
  </defs>
  <!-- Connection lines -->
  <line x1="32" y1="32" x2="12" y2="12" stroke="#ad1457" stroke-width="2"/>
  <line x1="32" y1="32" x2="52" y2="12" stroke="#ad1457" stroke-width="2"/>
  <line x1="32" y1="32" x2="8" y2="48" stroke="#ad1457" stroke-width="2"/>
  <line x1="32" y1="32" x2="56" y2="48" stroke="#ad1457" stroke-width="2"/>
  <line x1="12" y1="12" x2="52" y2="12" stroke="#ad1457" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="48" x2="56" y2="48" stroke="#ad1457" stroke-width="1" opacity="0.5"/>
  <!-- Nodes -->
  <circle cx="12" cy="12" r="6" fill="url(#node-p)" stroke="#4a0072" stroke-width="1.5"/>
  <circle cx="52" cy="12" r="6" fill="url(#node-p)" stroke="#4a0072" stroke-width="1.5"/>
  <circle cx="8" cy="48" r="6" fill="url(#node-p)" stroke="#4a0072" stroke-width="1.5"/>
  <circle cx="56" cy="48" r="6" fill="url(#node-p)" stroke="#4a0072" stroke-width="1.5"/>
  <!-- Center node (bigger) -->
  <circle cx="32" cy="32" r="10" fill="url(#node-p)" stroke="#4a0072" stroke-width="2"/>
  <!-- Data packets -->
  <rect x="20" y="20" width="3" height="3" fill="#fff" opacity="0.8"/>
  <rect x="42" y="22" width="3" height="3" fill="#fff" opacity="0.8"/>
  <rect x="22" y="42" width="3" height="3" fill="#fff" opacity="0.8"/>
</svg>
