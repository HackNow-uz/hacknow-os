<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="lens-b" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#bbdefb"/>
      <stop offset="60%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
  </defs>
  <!-- Magnifier handle -->
  <line x1="42" y1="42" x2="58" y2="58" stroke="#0d47a1" stroke-width="6" stroke-linecap="round"/>
  <line x1="42" y1="42" x2="58" y2="58" stroke="#42a5f5" stroke-width="3" stroke-linecap="round"/>
  <!-- Lens -->
  <circle cx="26" cy="26" r="18" fill="url(#lens-b)" stroke="#0d47a1" stroke-width="3"/>
  <!-- Fingerprint inside lens (curved arcs) -->
  <g fill="none" stroke="#0d47a1" stroke-width="1.5" stroke-linecap="round">
    <path d="M 18 18 Q 26 14 34 18"/>
    <path d="M 16 22 Q 26 16 36 22"/>
    <path d="M 15 27 Q 26 20 37 27"/>
    <path d="M 16 32 Q 26 25 36 32"/>
    <path d="M 18 36 Q 26 30 34 36"/>
    <path d="M 22 34 Q 26 32 30 34"/>
  </g>
  <!-- Reflection -->
  <ellipse cx="20" cy="20" rx="4" ry="2" fill="#fff" opacity="0.5"/>
</svg>
