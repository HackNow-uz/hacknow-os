<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="crown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffeb3b"/>
      <stop offset="50%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#ff6f00"/>
    </linearGradient>
  </defs>
  <!-- Crown base -->
  <rect x="12" y="40" width="40" height="8" rx="1" fill="url(#crown)" stroke="#7d4f00" stroke-width="1.5"/>
  <!-- Crown points (5 spikes) -->
  <polygon points="12,40 18,18 24,40" fill="url(#crown)" stroke="#7d4f00" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="20,40 26,12 32,40" fill="url(#crown)" stroke="#7d4f00" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="28,40 32,8 36,40" fill="url(#crown)" stroke="#7d4f00" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="32,40 38,12 44,40" fill="url(#crown)" stroke="#7d4f00" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="40,40 46,18 52,40" fill="url(#crown)" stroke="#7d4f00" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Gems on spikes -->
  <circle cx="18" cy="20" r="2.5" fill="#d50000"/>
  <circle cx="26" cy="14" r="2.5" fill="#1976d2"/>
  <circle cx="32" cy="10" r="3" fill="#d50000"/>
  <circle cx="38" cy="14" r="2.5" fill="#1976d2"/>
  <circle cx="46" cy="20" r="2.5" fill="#d50000"/>
  <!-- Base gems -->
  <circle cx="22" cy="44" r="2" fill="#d50000"/>
  <circle cx="32" cy="44" r="2" fill="#1976d2"/>
  <circle cx="42" cy="44" r="2" fill="#d50000"/>
  <!-- Up arrow (escalation) -->
  <path d="M 26 58 L 32 52 L 38 58 M 32 52 L 32 60"
        fill="none" stroke="#b71c1c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
