<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="eye-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="60%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </radialGradient>
  </defs>
  <!-- Eye outline (almond) -->
  <path d="M 6 32 Q 32 8 58 32 Q 32 56 6 32 Z"
        fill="#fce4ec" stroke="#b71c1c" stroke-width="2.5"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="13" fill="url(#eye-r)" stroke="#7f0000" stroke-width="1.5"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="6" fill="#000"/>
  <!-- Highlight -->
  <circle cx="28" cy="28" r="2.5" fill="#fff" opacity="0.9"/>
  <!-- Network dots around eye -->
  <circle cx="10" cy="14" r="2.5" fill="#d32f2f"/>
  <circle cx="54" cy="14" r="2.5" fill="#d32f2f"/>
  <circle cx="10" cy="50" r="2.5" fill="#d32f2f"/>
  <circle cx="54" cy="50" r="2.5" fill="#d32f2f"/>
  <!-- Connection lines -->
  <line x1="10" y1="14" x2="22" y2="22" stroke="#d32f2f" stroke-width="1" opacity="0.6"/>
  <line x1="54" y1="14" x2="42" y2="22" stroke="#d32f2f" stroke-width="1" opacity="0.6"/>
  <line x1="10" y1="50" x2="22" y2="42" stroke="#d32f2f" stroke-width="1" opacity="0.6"/>
  <line x1="54" y1="50" x2="42" y2="42" stroke="#d32f2f" stroke-width="1" opacity="0.6"/>
</svg>
