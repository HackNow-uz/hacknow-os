[greeter]
# Login background — HackNow wallpaper bilan
background = /usr/share/backgrounds/hacknow/login.png
user-background = false

# Theme
theme-name = HackNow-Dark
icon-theme-name = Papirus-Dark
cursor-theme-name = Bibata-Modern-Classic
cursor-theme-size = 24

# Font
font-name = Noto Sans 11
xft-antialias = true
xft-hintstyle = hintfull
xft-rgba = rgb

# Position — center
position = 50%,center 50%,center

# Top panel
panel-position = top
indicators = ~host;~spacer;~clock;~spacer;~session;~language;~a11y;~power
clock-format = %H:%M | %d.%m.%Y

# User
hide-user-image = false
default-user-image = /usr/share/pixmaps/hacknow-logo.png

# Monitor
active-monitor = 0

[greeter-theme]
# Frosted glass effekti — semi-transparent
background-color = "#0a0a0a"
window-color = "#0f0f10"
border-color = "#FF1744"
border-radius = 14
text-color = "#f0f0f0"
selected-background-color = "#FF1744"
selected-border-color = "#FF6680"
selected-text-color = "#ffffff"
error-color = "#ff3b3b"

# Fields
fieldset-background-color = "#111827"
input-color = "#f0f0f0"
input-background-color = "#111827"
button-color = "#FF1744"
