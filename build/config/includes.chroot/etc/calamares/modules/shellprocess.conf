dontChroot: false
timeout: 300

script:
  # Klaviaturani majburlash: us (default), uz(latin), ru — Uzbek til tanlansa ham
  - command: "/usr/local/sbin/hacknow-fix-keyboard"
    timeout: 10
  - command: "echo 'HackNow OS 0.1.0-alpha.2' > /etc/hacknow-version"
    timeout: 5
  - command: "update-alternatives --set x-terminal-emulator /usr/bin/xfce4-terminal || true"
    timeout: 10
  - command: "plymouth-set-default-theme hacknow || true"
    timeout: 10
  - command: "update-initramfs -u || true"
    timeout: 300
  - command: "systemctl enable NetworkManager || true"
    timeout: 10
  # Live USB welcome o'rnatilgan tizimda chiqmasligi uchun olib tashlash
  - command: "rm -f /home/*/.config/autostart/hacknow-welcome.desktop /home/*/.config/autostart/hacknow-first-setup.desktop || true"
    timeout: 5
  # Live-session artefaktlarni tozalash
  - command: "rm -f /home/*/Desktop/install-hacknow.desktop || true"
    timeout: 5
  - command: "rm -f /usr/share/applications/install-hacknow.desktop || true"
    timeout: 5
