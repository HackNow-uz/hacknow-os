dontChroot: false
timeout: 300

script:
  - command: "echo 'HackNow OS 0.1.0-alpha' > /etc/hacknow-version"
    timeout: 5
  - command: "update-alternatives --set x-terminal-emulator /usr/bin/xfce4-terminal || true"
    timeout: 10
  - command: "plymouth-set-default-theme hacknow || true"
    timeout: 10
  - command: "update-initramfs -u || true"
    timeout: 300
  - command: "systemctl enable NetworkManager || true"
    timeout: 10
  # Live-session artefaktlarni tozalash
  - command: "rm -f /home/*/Desktop/install-hacknow.desktop || true"
    timeout: 5
  - command: "rm -f /usr/share/applications/install-hacknow.desktop || true"
    timeout: 5
