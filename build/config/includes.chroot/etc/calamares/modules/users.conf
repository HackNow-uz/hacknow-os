defaultGroups:
    - name: users
      must_exist: true
      system: true
    - name: sudo
      must_exist: false
    - name: netdev
    - name: bluetooth
    - name: scanner
    - name: wireshark
    - name: docker

autologinGroup: autologin

doAutologin: false

setRootPassword: true
doReusePassword: true

passwordRequirements:
    minLength: 8
    maxLength: -1
    libpwquality:
        - minlen=8
        - minclass=2

allowWeakPasswords: false
allowWeakPasswordsDefault: false

user:
    shell: /bin/zsh
    forbidden_names: [ root, hacknow, admin, administrator, test, guest, kali, pi, ubuntu ]
