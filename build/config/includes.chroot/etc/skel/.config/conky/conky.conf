conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 0,
    cpu_avg_samples = 2,
    default_color = 'f0f0f0',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = false,
    draw_outline = false,
    draw_shades = false,
    font = 'Hack Nerd Font Mono:size=9',
    gap_x = 20,
    gap_y = 50,
    minimum_height = 400,
    minimum_width = 290,
    maximum_width = 290,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    update_interval = 3.0,
    uppercase = false,
    use_xft = true,
    xftalpha = 1,
    color1 = 'FF1744',
    color2 = 'a4b1cd',
    color3 = '00FF41',
    color4 = '00d4ff',
    color5 = '5a6a84',
    color6 = 'F59E0B',
    color7 = 'FF6680',
};

conky.text = [[
${color1}╭─── SYSTEM ─────────────────╮${color}
${color5}│${color2} OS      ${color}${alignr}HackNow OS 0.1
${color5}│${color2} Kernel  ${color}${alignr}${kernel}
${color5}│${color2} Uptime  ${color}${alignr}${uptime_short}
${color5}│${color2} User    ${color}${alignr}${user_names}
${color1}├─── CPU ────────────────────┤${color}
${color5}│${color2} Usage   ${color}${alignr}${cpu}%
${color5}│${color} ${cpubar 6,250}
${color5}│${color2} Freq    ${color}${alignr}${freq_g}GHz
${color1}├─── MEMORY ─────────────────┤${color}
${color5}│${color2} RAM     ${color}${alignr}${mem} / ${memmax}
${color5}│${color} ${membar 6,250}
${color1}├─── NETWORK ────────────────┤${color}
${color5}│${color3} ▼ Down  ${color}${alignr}${downspeed eth0}
${color5}│${color4} ▲ Up    ${color}${alignr}${upspeed eth0}
${color5}│${color2} Eth0    ${color}${alignr}${addr eth0}
${color5}│${color7} VPN     ${color}${alignr}${if_existing /proc/net/route tun0}${addr tun0}${else}${color5}o'chiq${color}${endif}
${color5}│${color6} Tor     ${color}${alignr}${if_running tor}${color3}faol${color}${else}${color5}o'chiq${color}${endif}
${color1}├─── TARGET ─────────────────┤${color}
${color5}│${color7} IP      ${color}${alignr}${execi 10 echo $${TARGET:-yoq}}
${color5}│${color2} Scope   ${color}${alignr}${execi 10 wc -l < ~/.hacknow-scope 2>/dev/null || echo 0} ta
${color1}├─── DISK ───────────────────┤${color}
${color5}│${color2} Root    ${color}${alignr}${fs_used /} / ${fs_size /}
${color5}│${color} ${fs_bar 6,250 /}
${color1}├─── TOP PROCESSES ──────────┤${color}
${color5}│${color6} ${top name 1}${alignr}${top cpu 1}%
${color5}│${color2} ${top name 2}${alignr}${top cpu 2}%
${color5}│${color2} ${top name 3}${alignr}${top cpu 3}%
${color5}│${color2} ${top name 4}${alignr}${top cpu 4}%
${color1}╰────────────────────────────╯${color}
${color5}${alignc}HACKNOW OS v0.1 │ ${time %H:%M:%S}
]];
