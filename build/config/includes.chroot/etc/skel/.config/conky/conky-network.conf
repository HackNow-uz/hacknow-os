conky.config = {
    alignment = 'top_left',
    background = true,
    border_width = 0,
    cpu_avg_samples = 2,
    default_color = 'f0f0f0',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = false,
    draw_outline = false,
    draw_shades = false,
    font = 'Hack Nerd Font Mono:size=9',
    gap_x = 20,
    gap_y = 50,
    minimum_height = 420,
    minimum_width = 300,
    maximum_width = 300,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    update_interval = 5.0,
    uppercase = false,
    use_xft = true,
    xftalpha = 1,
    color1 = 'FF1744',
    color2 = 'a4b1cd',
    color3 = '00FF41',
    color4 = '00d4ff',
    color5 = '5a6a84',
    color6 = 'F59E0B',
    color7 = 'FF6680',
};

conky.text = [[
${color1}╭─── NETWORK INTEL ──────────╮${color}
${color5}│${color2} Local   ${color3}${alignr}${addr eth0}${color}
${color5}│${color2} Public  ${color4}${alignr}${execi 300 timeout 3 curl -s ifconfig.me 2>/dev/null || echo -}${color}
${color5}│${color2} MAC     ${color}${alignr}${execi 60 ip link show eth0 | awk '/ether/{print $2}'}
${color5}│${color2} Gateway ${color}${alignr}${execi 30 ip -4 -o route show default | awk '{print $3}' | head -1}
${color5}│${color2} DNS     ${color}${alignr}${execi 60 awk '/^nameserver/{print $2; exit}' /etc/resolv.conf}
${color1}├─── TRAFFIC ────────────────┤${color}
${color5}│${color3} ▼ Down  ${color}${alignr}${downspeed eth0}
${color5}│${color4} ▲ Up    ${color}${alignr}${upspeed eth0}
${color1}├─── CONNECTIONS ────────────┤${color}
${color5}│${color2} Estab   ${color6}${alignr}${execi 10 ss -tn state established 2>/dev/null | tail -n +2 | wc -l}${color}
${color5}│${color2} Listen  ${color3}${alignr}${execi 10 ss -tlnH 2>/dev/null | awk '{print $4}' | sed 's/.*://' | sort -un | paste -sd ',' | cut -c1-20}${color}
${color5}│${color2} Neigh   ${color}${alignr}${execi 30 ip -4 neigh 2>/dev/null | grep -v FAILED | awk '{print $1}' | head -2 | paste -sd ' '}
${color1}├─── SECURITY ───────────────┤${color}
${color5}│${color2} SSH     ${color}${alignr}${execi 15 systemctl is-active ssh 2>/dev/null || echo off}
${color5}│${color2} VPN     ${color}${alignr}${if_existing /proc/net/route tun0}${color3}faol${color}${else}${color5}o'chiq${color}${endif}
${color5}│${color2} Tor     ${color}${alignr}${if_running tor}${color3}faol${color}${else}${color5}o'chiq${color}${endif}
${color1}├─── PENTEST CHEATSHEET ─────┤${color}
${color5}│${color7} nmap   ${color2}${alignr}-sV -sC -p- -T4${color}
${color5}│${color7} gobust ${color2}${alignr}dir -u URL -w WORDS${color}
${color5}│${color7} sqlmap ${color2}${alignr}-u URL --batch --dbs${color}
${color5}│${color7} ffuf   ${color2}${alignr}-u URL/FUZZ -w WORDS${color}
${color5}│${color7} hydra  ${color2}${alignr}-L users -P pwd ssh${color}
${color1}╰────────────────────────────╯${color}
${color5}${alignc}NET INTEL │ ${time %H:%M:%S}
]];
