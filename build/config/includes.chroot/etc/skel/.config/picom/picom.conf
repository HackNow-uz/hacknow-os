# HackNow OS — Picom Compositor
# Rounded corners, shadows, transparency, blur

# Backend
backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# Shadows
shadow = true;
shadow-radius = 14;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.6;
shadow-color = "#000000";
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Rounded corners
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# Transparency / Opacity
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
focus-exclude = [
  "class_g = 'Cairo-clock'"
];

# Blur — kernel (xrender uchun mos), dual_kawase faqat glx-experimental'da
blur-method = "kernel";
blur-strength = 3;
blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;
blur-kern = "3x3box";
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;
fade-exclude = [];

# Animations — stock Debian picom bu opsiyalarni qo'llab-quvvatlamaydi
# Faqat picom fork (FT-Labs/picom) da ishlaydi
# animations = true;
# animation-stiffness = 200;
# animation-window-mass = 0.5;
# animation-dampening = 20;
# animation-clamping = true;
# animation-for-open-window = "zoom";
# animation-for-unmap-window = "zoom";

# Other
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
log-level = "warn";
