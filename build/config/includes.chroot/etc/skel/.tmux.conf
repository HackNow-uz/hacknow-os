# HackNow OS — Tmux Configuration
# Cyberpunk red theme

# === General ===
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on
set -g status-keys vi
setw -g mode-keys vi

# === Prefix ===
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# === Reload config ===
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# === Splits ===
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# === Pane navigation (vim-like) ===
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# === Pane resize ===
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# === Window navigation ===
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4

# === Copy mode (vim-like) ===
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# === Status bar — HackNow theme ===
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-bg "#0a0a0a"
set -g status-fg "#f0f0f0"
set -g status-left-length 40
set -g status-right-length 100

# Status left: session + window
set -g status-left "#[fg=#FF1744,bg=#0a0a0a,bold] HN #[fg=#f0f0f0,bg=#111827] #S #[fg=#111827,bg=#0a0a0a]"

# Status right: target + clock
set -g status-right "#[fg=#00d4ff,bg=#0a0a0a]target:#{?TARGET,#[fg=#FF1744]$TARGET,none} #[fg=#5a6a84]│ #[fg=#00FF41]%H:%M #[fg=#5a6a84]│ #[fg=#a4b1cd]%d-%m"

# Windows
setw -g window-status-format " #I #W "
setw -g window-status-current-format "#[fg=#0a0a0a,bg=#FF1744,bold] #I #W #[fg=#FF1744,bg=#0a0a0a]"
setw -g window-status-style "fg=#a4b1cd"
setw -g window-status-current-style "bg=#FF1744,fg=#ffffff,bold"

# Pane borders
set -g pane-border-style "fg=#1a2332"
set -g pane-active-border-style "fg=#FF1744"

# Messages
set -g message-style "bg=#0a0a0a,fg=#FF1744"
set -g message-command-style "bg=#0a0a0a,fg=#00FF41"

# Activity
setw -g monitor-activity on
setw -g window-status-activity-style "fg=#F59E0B,bg=#0a0a0a"

# Clock
setw -g clock-mode-colour "#FF1744"
setw -g clock-mode-style 24

# === Tmux Plugin Manager (TPM) ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect — sessionlarni saqlash
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum — avtomatik save har 15 daqiqa
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (END of config bo'lishi kerak)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
