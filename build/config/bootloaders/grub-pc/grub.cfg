menuentry "HackNow OS - Tuzatish rejimi" {
    linux /live/vmlinuz boot=live components username=hacknow hostname=hacknow-os net.ifnames=0 biosdevname=0 locales=uz_UZ.UTF-8 keyboard-layouts=uz debug
    initrd /live/initrd.img
}

menuentry "BIOS/UEFI sozlamalari" {
    fwsetup
}
