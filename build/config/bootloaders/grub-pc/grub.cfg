# HackNow OS — GRUB Boot Menu (BIOS)

set default=0
set timeout=10

if loadfont /boot/grub/fonts/unicode.pf2; then
    set gfxmode=auto
    insmod efi_gop
    insmod efi_uga
    insmod gfxterm
    insmod gfxmenu
    terminal_output gfxterm
fi

if [ -f /boot/grub/themes/hacknow/theme.txt ]; then
    set theme=/boot/grub/themes/hacknow/theme.txt
else
    set menu_color_normal=white/black
    set menu_color_highlight=white/red
fi

menuentry "HackNow OS - Ishga tushirish" {
    linux /live/vmlinuz boot=live components username=hacknow hostname=hacknow-os net.ifnames=0 biosdevname=0 locales=uz_UZ.UTF-8 keyboard-layouts=uz quiet splash
    initrd /live/initrd.img
}

menuentry "HackNow OS - RAMga yuklash (toram)" {
    linux /live/vmlinuz boot=live components username=hacknow hostname=hacknow-os net.ifnames=0 biosdevname=0 locales=uz_UZ.UTF-8 keyboard-layouts=uz toram quiet splash
    initrd /live/initrd.img
}

menuentry "HackNow OS - Forensik rejim" {
    linux /live/vmlinuz boot=live components username=hacknow hostname=hacknow-os net.ifnames=0 biosdevname=0 locales=uz_UZ.UTF-8 keyboard-layouts=uz noswap noautomount quiet splash
    initrd /live/initrd.img
}

menuentry "HackNow OS - Xavfsiz grafika" {
    linux /live/vmlinuz boot=live components username=hacknow hostname=hacknow-os net.ifnames=0 biosdevname=0 locales=uz_UZ.UTF-8 keyboard-layouts=uz nomodeset quiet splash
    initrd /live/initrd.img
