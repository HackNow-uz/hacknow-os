# HackNow OS Neofetch Config

print_info() {
    info title
    info underline

    info "OS" distro
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "DE" de
    info "WM" wm
    info "Terminal" term
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory
    info "Disk" disk
    info "Local IP" local_ip

    info cols
}

# HackNow custom ASCII art
image_backend="ascii"
image_source="/etc/neofetch/hacknow.ascii"
ascii_distro="off"
# color1=red (matches #FF1744 HackNow primary accent)
ascii_colors=(1 1 1 1 1 7)
colors=(1 7 7 1 1 7)
bold="on"
underline="on"
separator=" →"
color_blocks="on"
